spring:
  application:
    name: micro1-idempotencia

  # ─────────────────────────────────────────
  # KAFKA
  # ─────────────────────────────────────────
  kafka:
    bootstrap-servers: localhost:9092
    consumer:
      group-id: micro1-idempotencia-group
      auto-offset-reset: earliest
      key-deserializer: org.apache.kafka.common.serialization.StringDeserializer
      value-deserializer: org.springframework.kafka.support.serializer.JsonDeserializer
      properties:
        spring.json.trusted.packages: "com.notification.idempotencia.*"
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: org.springframework.kafka.support.serializer.JsonSerializer
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        max.in.flight.requests.per.connection: 1

  # ─────────────────────────────────────────
  # MONGODB — DocumentDB en local
  # ─────────────────────────────────────────
  data:
    mongodb:
      uri: mongodb://notifadmin:NotifLocal2024@localhost:27017/notificaciones?authSource=admin
      database: notificaciones
    
    # ─────────────────────────────────────────
    # REDIS — cache de duplicados
    # ─────────────────────────────────────────
    redis:
      host: localhost
      port: 6379
      timeout: 2000ms

# ─────────────────────────────────────────
# TOPICS DE KAFKA
# ─────────────────────────────────────────
kafka:
  topics:
    transacciones-raw: transacciones-raw
    notificaciones-pendientes: notificaciones-pendientes

# ─────────────────────────────────────────
# IDEMPOTENCIA
# ─────────────────────────────────────────
idempotencia:
  ttl-horas: 24

# ─────────────────────────────────────────
# ACTUATOR — health checks
# ─────────────────────────────────────────
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      show-details: always

server:
  port: 8080
